services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 30s

  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      REDIS_URL: redis://redis:6379
      CHROMA_DIR: /app/data/chroma_db
      DOCUMENTS_DIR: /app/documentos_soporte
      CORS_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
    volumes:
      - chroma_data:/app/data/chroma_db
      - ./documentos_soporte:/app/documentos_soporte:ro
    depends_on:
      redis:
        condition: service_healthy
      ollama:
        condition: service_healthy

  web:
    build:
      context: ./frontend
      args:
        VITE_API_BASE: /api
    ports:
      - "3000:80"
    depends_on:
      - api

volumes:
  redis_data:
  ollama_data:
  chroma_data:
